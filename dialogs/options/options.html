<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n-content="options.title"></title>
    <script type="module" src="options.mjs"></script>
    <style>
      :root {
        --bg-page: #fff;
        --bg-card: #fff;
        --bg-input-disabled: #f4f4f6;
        --bg-display: #f8f8f9;
        --text-primary: #222;
        --text-secondary: #555;
        --text-tertiary: #666;
        --text-body: #333;
        --border-input: #ccc;
        --border-subtle: #ececee;
        --accent: #2a7fd4;
        --accent-hover: #1a6fc4;
        --btn-secondary-bg: #e5e5e7;
        --warning-bg: #fff6d9;
        --warning-accent: #e8b923;
        --warning-text: #5a4200;
        --error-bg: #ffe0e0;
        --error-accent: #c43b3b;
        --error-text: #7a2222;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-page: #1e1f21;
          --bg-card: #2b2d30;
          --bg-input-disabled: #2a2c2f;
          --bg-display: #26282b;
          --text-primary: #e8e9eb;
          --text-secondary: #b3b5ba;
          --text-tertiary: #9498a0;
          --text-body: #d6d8dc;
          --border-input: #4a4d52;
          --border-subtle: #3a3c40;
          --accent: #5fa6e8;
          --accent-hover: #7ab5ec;
          --btn-secondary-bg: #3a3c40;
          --warning-bg: #3d3319;
          --warning-accent: #d9b74e;
          --warning-text: #e6c76c;
          --error-bg: #3f1f1f;
          --error-accent: #e66a6a;
          --error-text: #f3a5a5;
        }
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-page);
        margin: 0;
        padding: 20px 24px;
      }
      h2 { margin: 0 0 10px; font-size: 15px; font-weight: 600; }

      .intro-banner {
        background: var(--warning-bg);
        border-left: 3px solid var(--warning-accent);
        padding: 8px 12px;
        font-size: 12px;
        color: var(--warning-text);
        border-radius: 3px;
        margin-bottom: 16px;
      }

      .section {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--border-subtle);
      }
      .section:first-of-type {
        margin-top: 6px;
        padding-top: 0;
        border-top: none;
      }
      .section h3 {
        margin: 0 0 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--text-tertiary);
      }

      .field { display: flex; flex-direction: column; margin-bottom: 14px; }
      .field label {
        font-size: 11px; color: var(--text-secondary); text-transform: uppercase;
        letter-spacing: .04em; margin-bottom: 4px;
      }
      .field input[type="text"],
      .field input[type="number"] {
        padding: 5px 8px; border: 1px solid var(--border-input); border-radius: 4px; font-size: 13px;
        background: var(--bg-card); color: var(--text-primary);
      }
      .field input::placeholder { color: var(--text-tertiary); opacity: .8; }
      .field .hint {
        font-size: 11px; color: var(--text-tertiary); margin-top: 4px; line-height: 1.4;
      }

      .checkbox-row { display: flex; align-items: flex-start; gap: 8px; margin: 6px 0 14px; }
      .checkbox-row input { margin-top: 2px; flex-shrink: 0; }
      .checkbox-row .checkbox-body { display: flex; flex-direction: column; gap: 2px; }
      .checkbox-row .label { font-size: 13px; color: var(--text-body); }
      .checkbox-row .hint { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }
      .checkbox-row label { margin: 0; padding: 0; }
    </style>
  </head>
  <body>
    <h2 data-i18n-content="options.title"></h2>

    <div class="intro-banner" data-i18n-content="options.intro"></div>

    <div class="section">
      <h3 data-i18n-content="options.section.network"></h3>

      <div class="field">
        <label for="opt-timeout" data-i18n-content="options.timeout"></label>
        <input id="opt-timeout" type="number" min="1" step="1000" placeholder="90000" />
        <span class="hint" data-i18n-content="options.timeout.hint"></span>
      </div>

      <div class="field">
        <label for="opt-useragent" data-i18n-content="options.useragent"></label>
        <input id="opt-useragent" type="text" autocomplete="off" spellcheck="false" placeholder="Thunderbird ActiveSync" />
        <span class="hint" data-i18n-content="options.useragent.hint"></span>
      </div>

      <div class="field">
        <label for="opt-devicetype" data-i18n-content="options.devicetype"></label>
        <input id="opt-devicetype" type="text" autocomplete="off" spellcheck="false" placeholder="TbSync" />
        <span class="hint" data-i18n-content="options.devicetype.hint"></span>
      </div>
    </div>

    <div class="section">
      <h3 data-i18n-content="options.section.sync"></h3>

      <div class="field">
        <label for="opt-maxitems" data-i18n-content="options.maxitems"></label>
        <input id="opt-maxitems" type="number" min="1" step="1" placeholder="25" />
        <span class="hint" data-i18n-content="options.maxitems.hint"></span>
      </div>

      <div class="checkbox-row">
        <input id="opt-mstodo" type="checkbox" />
        <span class="checkbox-body">
          <label for="opt-mstodo" class="label" data-i18n-content="options.mstodo"></label>
          <span class="hint" data-i18n-content="options.mstodo.hint"></span>
        </span>
      </div>
    </div>

    <div class="section">
      <h3 data-i18n-content="options.section.oauth"></h3>

      <div class="field">
        <label for="opt-clientid" data-i18n-content="options.clientid"></label>
        <input id="opt-clientid" type="text" autocomplete="off" spellcheck="false" />
        <span class="hint" data-i18n-content="options.clientid.hint"></span>
      </div>
    </div>
  </body>
</html>
