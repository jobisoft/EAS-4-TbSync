<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n-content="setup.title"></title>
    <link rel="stylesheet" href="../shared/dropdown.css" />
    <script type="module" src="setup.mjs"></script>
    <style>
      :root {
        --bg-page: #fff;
        --bg-card: #fff;
        --bg-card-hover: #f6f9fd;
        --bg-card-active: #e6efff;
        --text-primary: #222;
        --text-secondary: #555;
        --text-tertiary: #777;
        --border-input: #ccc;
        --border-card: #d0d4d9;
        --border-card-active: #2a7fd4;
        --accent: #2a7fd4;
        --accent-hover: #1a6fc4;
        --btn-secondary-bg: #e5e5e7;
        --error-bg: #ffe0e0;
        --error-accent: #c43b3b;
        --error-text: #7a2222;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-page: #1e1f21;
          --bg-card: #2b2d30;
          --bg-card-hover: #34373d;
          --bg-card-active: #2a3e5a;
          --text-primary: #e8e9eb;
          --text-secondary: #b3b5ba;
          --text-tertiary: #9498a0;
          --border-input: #4a4d52;
          --border-card: #4a4d52;
          --border-card-active: #5fa6e8;
          --accent: #5fa6e8;
          --accent-hover: #7ab5ec;
          --btn-secondary-bg: #3a3c40;
          --error-bg: #3f1f1f;
          --error-accent: #e66a6a;
          --error-text: #f3a5a5;
        }
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-page);
        margin: 0;
        padding: 20px 24px;
      }
      h2 { margin: 0 0 10px; font-size: 15px; font-weight: 600; }
      p.intro { color: var(--text-secondary); line-height: 1.5; margin: 0 0 16px; }

      .field { display: flex; flex-direction: column; margin-bottom: 10px; }
      .field label {
        font-size: 11px; color: var(--text-secondary); text-transform: uppercase;
        letter-spacing: .04em; margin-bottom: 4px;
      }
      .field input,
      .field select {
        padding: 5px 8px; border: 1px solid var(--border-input); border-radius: 4px; font-size: 13px;
        background: var(--bg-page); color: var(--text-primary);
      }
      .field .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
      .panel[hidden] { display: none; }

      .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
      button.primary {
        padding: 6px 14px; background: var(--accent); color: #fff; border: none;
        border-radius: 4px; cursor: pointer; font-size: 13px;
      }
      button.primary:hover { background: var(--accent-hover); }
      button.primary:disabled { opacity: .5; cursor: not-allowed; }
      button.secondary {
        padding: 6px 14px; background: var(--btn-secondary-bg); color: var(--text-primary); border: none;
        border-radius: 4px; cursor: pointer; font-size: 13px;
      }

      .error {
        margin-top: 10px; padding: 8px 12px; background: var(--error-bg);
        border-left: 3px solid var(--error-accent); color: var(--error-text); font-size: 12px;
        border-radius: 3px; display: none;
      }
      .error.visible { display: block; }

      .status-line {
        margin-top: 8px; font-size: 12px; color: var(--text-secondary);
        display: flex; align-items: center; gap: 6px;
      }
      .status-line::before {
        content: ""; width: 12px; height: 12px;
        border: 2px solid var(--border-card); border-top-color: var(--accent);
        border-radius: 50%; animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .popover {
        margin: auto; padding: 16px 18px; min-width: 360px; max-width: 480px;
        background: var(--bg-card); color: var(--text-primary);
        border: 1px solid var(--border-card); border-radius: 6px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
      }
      .popover h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
      .popover p { margin: 0 0 8px; line-height: 1.4; }
      .popover ul {
        margin: 0 0 12px; padding-left: 18px;
        font-size: 11px; color: var(--text-tertiary);
        max-height: 140px; overflow-y: auto; word-break: break-all;
      }
      .popover .actions { margin-top: 12px; }
      .popover::backdrop { background: rgba(0, 0, 0, .35); }
    </style>
  </head>
  <body>
    <h2 data-i18n-content="setup.title"></h2>
    <p class="intro" data-i18n-content="setup.intro"></p>

    <div class="field">
      <label data-i18n-content="setup.accountType"></label>
      <div id="account-type"></div>
    </div>

    <div id="oauth-panel" class="panel">
      <div class="field">
        <label data-i18n-content="setup.oauth.email"></label>
        <input id="oauth-email" type="email" autocomplete="username" spellcheck="false" />
      </div>
    </div>

    <div id="auto-panel" class="panel" hidden>
      <div class="field">
        <label data-i18n-content="setup.auto.email"></label>
        <input id="auto-email" type="email" autocomplete="username" spellcheck="false" />
      </div>
      <div class="field">
        <label data-i18n-content="setup.password"></label>
        <input id="auto-password" type="password" autocomplete="current-password" spellcheck="false" />
      </div>
      <p id="auto-status" class="status-line" hidden></p>
    </div>

    <div id="basic-panel" class="panel" hidden>
      <div class="field">
        <label data-i18n-content="setup.accountName"></label>
        <input id="account-name" type="text" />
      </div>
      <div class="field">
        <label data-i18n-content="setup.server"></label>
        <input id="server" type="url" autocomplete="off" spellcheck="false" />
        <span class="hint" data-i18n-content="setup.serverHint"></span>
      </div>
      <div class="field">
        <label data-i18n-content="setup.user"></label>
        <input id="user" type="text" autocomplete="username" spellcheck="false" />
      </div>
      <div class="field">
        <label data-i18n-content="setup.password"></label>
        <input id="password" type="password" autocomplete="current-password" spellcheck="false" />
      </div>
    </div>

    <div id="error" class="error"></div>

    <div class="actions">
      <button id="btn-cancel" class="secondary" data-i18n-content="setup.cancelButton"></button>
      <button id="btn-submit" class="primary"></button>
    </div>

    <div id="auto-error-popover" popover="auto" class="popover">
      <h3 data-i18n-content="setup.auto.error.title"></h3>
      <p id="auto-error-detail"></p>
      <p id="auto-error-tried-label" class="hint" hidden data-i18n-content="setup.auto.error.tried"></p>
      <ul id="auto-error-tried"></ul>
      <p id="auto-error-fallback" class="hint" data-i18n-content="setup.auto.error.fallback"></p>
      <div class="actions">
        <button type="button" id="auto-error-close" class="primary" data-i18n-content="config.close"></button>
      </div>
    </div>
  </body>
</html>
